name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env to VPS
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          NEXT_BASE_API_URL: ${{ secrets.NEXT_BASE_API_URL }}
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "printf 'COOKIE_SECRET=%s\nNEXT_BASE_API_URL=%s\n' '$COOKIE_SECRET' '$NEXT_BASE_API_URL' > ~/Goldencare-fe/.env"

      - name: Deploy to VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/Goldencare-fe

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm ci --prefer-offline

            echo "==> Writing .env.local..."
            cat > .env.local << 'ENVEOF'
          COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
          NEXT_BASE_API_URL=${{ secrets.NEXT_BASE_API_URL }}
          ENVEOF

            echo "==> Building..."
            npm run build

            echo "==> Restarting PM2..."
            pm2 describe goldencare > /dev/null 2>&1 \
              && pm2 restart goldencare \
              || pm2 start npm --name "goldencare" -- start

            pm2 save
            echo "==> Deploy done!"
          EOF