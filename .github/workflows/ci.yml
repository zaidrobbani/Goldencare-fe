name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Run lint
        run: npm run lint

      - name: Build check
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          NEXT_BASE_API_URL: ${{ secrets.NEXT_BASE_API_URL }}
        run: npm run build